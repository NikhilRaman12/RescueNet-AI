version: "3.9"
services:
  backend:
    build: .
    ports:
      - "8010:8010"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8010
      USE_LIVE_APIS: "true"
      ENABLE_GUARDRAILS: "true"
      ENVIRONMENT: development
      APP_ENV: development
      USE_MOCK_SLACK_SEARCH: "true"
      USE_MOCK_MCP_TOOLS: "true"
      SLACK_BOT_TOKEN: ""
      SLACK_APP_TOKEN: ""
      SLACK_SIGNING_SECRET: ""
    volumes:
      - .:/app
